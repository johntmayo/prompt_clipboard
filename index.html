<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Clipboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0d14;
    --surface: #151421;
    --surface-hover: #1d1c2e;
    --border: #25243a;
    --border-hover: #38374e;
    --text: #eeedf5;
    --text-soft: #9998ae;
    --text-muted: #6c6b82;
    --accent: #a3e635;
    --accent-dim: rgba(163, 230, 53, 0.08);
    --before: #60a5fa;
    --before-dim: rgba(96, 165, 250, 0.08);
    --during: #fbbf24;
    --during-dim: rgba(251, 191, 36, 0.08);
    --after: #a78bfa;
    --after-dim: rgba(167, 139, 250, 0.08);
    --copied: #34d399;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 2.5rem 2rem;
  }

  .container {
    max-width: 740px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.75rem;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  header h1::before {
    content: '>';
    opacity: 0.4;
  }

  header p {
    font-size: 0.83rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
    padding-left: 1.1rem;
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 2.25rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.76rem;
    font-weight: 500;
    padding: 0.4rem 0.95rem;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
    text-transform: capitalize;
  }

  .filter-btn:hover {
    border-color: var(--border-hover);
    color: var(--text);
  }

  .filter-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Phase sections */
  .prompt-list {
    display: flex;
    flex-direction: column;
  }

  .phase-section {
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
  }

  .phase-section + .phase-section {
    margin-top: 2.25rem;
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    margin-bottom: 0.3rem;
  }

  .phase-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .phase-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.13em;
    text-transform: uppercase;
  }

  .phase-rule {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .phase-before .phase-dot  { background: var(--before); }
  .phase-before .phase-name { color: var(--before); }
  .phase-during .phase-dot  { background: var(--during); }
  .phase-during .phase-name { color: var(--during); }
  .phase-after  .phase-dot  { background: var(--after); }
  .phase-after  .phase-name { color: var(--after); }

  /* Cards */
  .prompt-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.2rem;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    align-items: flex-start;
    gap: 0.9rem;
  }

  .prompt-card:hover {
    background: var(--surface-hover);
    border-color: var(--border-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
  }

  .prompt-card:active {
    transform: translateY(0);
    box-shadow: none;
  }

  .prompt-card.copied {
    border-color: var(--copied) !important;
    box-shadow: 0 0 0 1px var(--copied), 0 0 20px rgba(52, 211, 153, 0.1) !important;
  }

  .prompt-content {
    flex: 1;
    min-width: 0;
  }

  .prompt-label {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.35rem;
    line-height: 1.3;
  }

  .prompt-text {
    font-size: 0.83rem;
    color: var(--text-soft);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .copy-icon {
    flex-shrink: 0;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    color: var(--text-muted);
    transition: all 0.15s ease;
    margin-top: 0.1rem;
  }

  .prompt-card:hover .copy-icon {
    color: var(--accent);
    background: var(--accent-dim);
  }

  .prompt-card.copied .copy-icon {
    color: var(--copied);
    background: rgba(52, 211, 153, 0.1);
  }

  .copy-icon svg { width: 16px; height: 16px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--copied);
    color: #0e0d14;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    padding: 0.5rem 1.1rem;
    border-radius: 100px;
    pointer-events: none;
    opacity: 0;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 100;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* Add section */
  .add-section {
    margin-top: 2.25rem;
    padding-top: 1.75rem;
    border-top: 1px solid var(--border);
  }

  .add-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    font-weight: 500;
    padding: 0.7rem 1rem;
    border-radius: var(--radius);
    border: 1px dashed var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    width: 100%;
    transition: all 0.15s ease;
  }

  .add-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .add-form {
    display: none;
    flex-direction: column;
    gap: 0.65rem;
  }

  .add-form.visible { display: flex; }

  .reset-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.73rem;
    padding: 0.3rem 0.65rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    margin-top: 0.5rem;
    transition: all 0.15s;
    display: block;
  }

  .reset-btn:hover {
    color: var(--text);
    border-color: var(--border-hover);
  }

  .add-form input,
  .add-form textarea,
  .add-form select {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    padding: 0.65rem 0.9rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .add-form input::placeholder,
  .add-form textarea::placeholder {
    color: var(--text-muted);
  }

  .add-form input:focus,
  .add-form textarea:focus {
    border-color: var(--accent);
  }

  .add-form textarea {
    resize: vertical;
    min-height: 90px;
    line-height: 1.55;
  }

  .add-form select { cursor: pointer; }

  .form-actions {
    display: flex;
    gap: 0.4rem;
    justify-content: flex-end;
  }

  .form-actions button {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 0.5rem 1.1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-cancel {
    background: transparent;
    color: var(--text-muted);
  }

  .btn-cancel:hover { color: var(--text); border-color: var(--border-hover); }

  .btn-save {
    background: var(--accent);
    color: #0e0d14;
    border-color: var(--accent);
    font-weight: 700;
  }

  .btn-save:hover { filter: brightness(1.1); }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .prompt-card { animation: fadeIn 0.2s ease both; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>prompt_clipboard</h1>
    <p>Click any prompt to copy. Add your own below.</p>
  </header>

  <div class="filter-bar" id="filters"></div>
  <div class="prompt-list" id="promptList"></div>

  <div class="add-section">
    <button class="add-btn" id="addBtn" onclick="toggleForm()">+ add prompt</button>
    <button class="reset-btn" onclick="resetDefaults()">reset to defaults</button>
    <div class="add-form" id="addForm">
      <input type="text" id="newLabel" placeholder="Label (e.g. Handoff Doc)">
      <textarea id="newPrompt" placeholder="Prompt text..."></textarea>
      <select id="newTag">
        <option value="before">before</option>
        <option value="during">during</option>
        <option value="after">after</option>
      </select>
      <div class="form-actions">
        <button class="btn-cancel" onclick="toggleForm()">cancel</button>
        <button class="btn-save" onclick="savePrompt()">save</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">✓ copied</div>

<script>
const CLIPBOARD_ICON = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9.75a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184" /></svg>`;
const CHECK_ICON = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" /></svg>`;

const PHASE_ORDER = ['before', 'during', 'after'];

const DEFAULT_PROMPTS = [
  // ── BEFORE ──
  {
    id: 'd5',
    label: 'Explain Before Changing',
    text: 'Before writing any code, explain your plan in plain language. What will you change, why, and what are the tradeoffs? Wait for my approval before implementing.',
    tag: 'before'
  },
  {
    id: 'd11',
    label: 'Scope Check',
    text: 'Before starting, tell me: What files will you need to touch? What\'s your understanding of the current behavior vs. desired behavior? Are there any dependencies or side effects I should know about?',
    tag: 'before'
  },
  {
    id: 'd23',
    label: 'Ask Before You Assume',
    text: 'If anything about this request is ambiguous or could be interpreted multiple ways, ask me 1-2 clarifying questions before proceeding. Don\'t guess at requirements — I\'d rather answer a quick question than undo wrong assumptions.',
    tag: 'before'
  },

  // ── DURING ──
  {
    id: 'd6',
    label: 'Minimal Fix Only',
    text: 'Fix only the specific bug or issue described. Do not refactor surrounding code, rename variables, change formatting, or make any other improvements — no matter how tempting.',
    tag: 'during'
  },
  {
    id: 'd28',
    label: 'Stay in Your Lane',
    text: 'Only change what I\'ve asked you to change. Do not "improve" other parts of the code you happen to notice. Do not add features I didn\'t request. Do not update formatting or style in files I didn\'t mention. Stay focused.',
    tag: 'during'
  },
  {
    id: 'd27',
    label: 'One Thing at a Time',
    text: 'Let\'s work on this incrementally. Do one small, complete change at a time. After each change, verify it works before moving on. Don\'t try to do everything in a single pass.',
    tag: 'during'
  },
  {
    id: 'd26',
    label: 'Expected vs. Actual',
    text: 'Here\'s the bug: I expected [X] but I\'m getting [Y]. Here\'s the relevant code: [paste]. Don\'t rewrite everything — just identify the root cause and suggest the minimal fix.',
    tag: 'during'
  },

  // ── AFTER ──
  {
    id: 'd4',
    label: 'Code Review',
    text: 'Review this code for bugs, edge cases, performance issues, and readability. Don\'t refactor — just flag problems with brief explanations of why they matter.',
    tag: 'after'
  },
  {
    id: 'd13',
    label: 'Risk Assessment',
    text: 'What risk is there to making these changes? Are you certain you understand all the angles and ramifications? Walk me through what could break, what depends on this code, and what assumptions you\'re making. If you\'re not fully certain, say so.',
    tag: 'after'
  },
  {
    id: 'd2',
    label: 'Handoff Document',
    text: 'Create a handoff document that captures all the key themes, decisions, open questions, and the current state of the project. Include enough context that a new AI session (or a teammate) could pick up where we left off.',
    tag: 'after'
  }
];

let prompts = [];
let activeFilter = 'all';

function loadPrompts() {
  const saved = localStorage.getItem('prompt_clipboard_data');
  if (saved) {
    prompts = JSON.parse(saved);
  } else {
    prompts = [...DEFAULT_PROMPTS];
    saveToStorage();
  }
}

function saveToStorage() {
  localStorage.setItem('prompt_clipboard_data', JSON.stringify(prompts));
}

function getAllTags() {
  const tags = new Set(prompts.map(p => p.tag));
  return ['all', ...Array.from(tags).sort()];
}

function renderFilters() {
  const container = document.getElementById('filters');
  const tags = getAllTags();
  container.innerHTML = tags.map(tag =>
    `<button class="filter-btn ${activeFilter === tag ? 'active' : ''}" onclick="setFilter('${tag}')">${tag}</button>`
  ).join('');
}

function setFilter(tag) {
  activeFilter = tag;
  renderFilters();
  renderPrompts();
}

function renderCard(p, delayIndex) {
  return `<div class="prompt-card" id="card-${p.id}" onclick="copyPrompt('${p.id}')" style="animation-delay:${delayIndex * 0.03}s" title="Click to copy">
    <div class="prompt-content">
      <div class="prompt-label">${p.label}</div>
      <div class="prompt-text">${escapeHtml(p.text)}</div>
    </div>
    <div class="copy-icon" id="icon-${p.id}">${CLIPBOARD_ICON}</div>
  </div>`;
}

function renderPrompts() {
  const container = document.getElementById('promptList');
  const filtered = activeFilter === 'all' ? prompts : prompts.filter(p => p.tag === activeFilter);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">No prompts in this category yet.</div>';
    return;
  }

  if (activeFilter === 'all') {
    const groups = {};
    filtered.forEach(p => {
      if (!groups[p.tag]) groups[p.tag] = [];
      groups[p.tag].push(p);
    });

    const orderedTags = [
      ...PHASE_ORDER.filter(t => groups[t]),
      ...Object.keys(groups).filter(t => !PHASE_ORDER.includes(t))
    ];

    let delay = 0;
    container.innerHTML = orderedTags.map(phase => {
      const cards = groups[phase];
      return `<div class="phase-section phase-${phase}">
        <div class="phase-header">
          <span class="phase-dot"></span>
          <span class="phase-name">${phase}</span>
          <span class="phase-rule"></span>
        </div>
        ${cards.map(p => renderCard(p, delay++)).join('')}
      </div>`;
    }).join('');
  } else {
    container.innerHTML = filtered.map((p, i) => renderCard(p, i)).join('');
  }
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

async function copyPrompt(id) {
  const prompt = prompts.find(p => p.id === id);
  if (!prompt) return;

  try {
    await navigator.clipboard.writeText(prompt.text);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = prompt.text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }

  const card = document.getElementById(`card-${id}`);
  const icon = document.getElementById(`icon-${id}`);
  card.classList.add('copied');
  icon.innerHTML = CHECK_ICON;

  const toast = document.getElementById('toast');
  toast.classList.add('show');

  setTimeout(() => {
    card.classList.remove('copied');
    icon.innerHTML = CLIPBOARD_ICON;
    toast.classList.remove('show');
  }, 1200);
}

function toggleForm() {
  const form = document.getElementById('addForm');
  const btn = document.getElementById('addBtn');
  const visible = form.classList.toggle('visible');
  btn.style.display = visible ? 'none' : 'block';
  if (visible) document.getElementById('newLabel').focus();
}

function savePrompt() {
  const label = document.getElementById('newLabel').value.trim();
  const text = document.getElementById('newPrompt').value.trim();
  const tag = document.getElementById('newTag').value;
  if (!label || !text) return;

  prompts.push({ id: 'u' + Date.now(), label, text, tag });
  saveToStorage();

  document.getElementById('newLabel').value = '';
  document.getElementById('newPrompt').value = '';
  toggleForm();
  renderFilters();
  renderPrompts();
}

function resetDefaults() {
  if (confirm('Reset to default prompts? This will remove any custom prompts you\'ve added.')) {
    localStorage.removeItem('prompt_clipboard_data');
    prompts = [...DEFAULT_PROMPTS];
    saveToStorage();
    renderFilters();
    renderPrompts();
  }
}

loadPrompts();
renderFilters();
renderPrompts();
</script>
</body>
</html>
