<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Clipboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #0f0f12;
    --surface:      #181820;
    --surface-hover:#1e1e28;
    --border:       #2a2a38;
    --border-hover: #3d3d52;
    --text:         #eeedf5;
    --text-soft:    #9896ae;
    --text-muted:   #5c5a72;
    --before:       #3b82f6;
    --during:       #f59e0b;
    --after:        #a855f7;
    --accent:       #a3e635;
    --accent-dim:   rgba(163,230,53,0.08);
    --copied:       #34d399;
    --radius:       11px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif;
    min-height: 100vh;
    padding: 3rem 2rem 5rem;
  }

  .container { max-width: 680px; margin: 0 auto; }

  /* ── Header ── */
  header { margin-bottom: 3rem; }

  .header-kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.65rem;
  }

  header h1 {
    font-size: 1.55rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.03em;
    line-height: 1.2;
    margin-bottom: 0.65rem;
  }

  .header-rule { height: 1px; background: var(--border); margin-bottom: 0.65rem; }

  header p { font-size: 0.82rem; color: var(--text-muted); }

  /* ── Filters ── */
  .filter-bar {
    display: flex;
    gap: 0.35rem;
    margin-bottom: 3rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 0.38rem 0.9rem;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s ease;
    text-transform: capitalize;
    user-select: none;
  }

  .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }

  .filter-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Phase sections ── */
  .prompt-list { display: flex; flex-direction: column; gap: 3.5rem; }

  .phase-section { display: flex; flex-direction: column; gap: 0.5rem; }

  /* The editorial section header */
  .phase-header { margin-bottom: 1rem; }

  .phase-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2.75rem;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.05em;
    margin-bottom: 0.2rem;
    opacity: 0.9;
  }

  .phase-label {
    display: block;
    font-size: 0.64rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding-bottom: 0.65rem;
    border-bottom: 1.5px solid currentColor;
    opacity: 0.8;
  }

  .phase-before .phase-num,
  .phase-before .phase-label { color: var(--before); }

  .phase-during .phase-num,
  .phase-during .phase-label { color: var(--during); }

  .phase-after  .phase-num,
  .phase-after  .phase-label { color: var(--after); }

  /* ── Cards ── */
  .prompt-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.1rem 1.1rem 1.2rem;
    cursor: pointer;
    transition: all 0.16s ease;
    display: flex;
    align-items: flex-start;
    gap: 0.85rem;
    animation: fadeUp 0.18s ease both;
  }

  .prompt-card:hover {
    background: var(--surface-hover);
    border-color: var(--border-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 22px rgba(0,0,0,0.4);
  }

  .prompt-card:active { transform: none; box-shadow: none; }

  .prompt-card.copied {
    border-color: var(--copied) !important;
    box-shadow: 0 0 0 1px var(--copied), 0 0 18px rgba(52,211,153,0.1) !important;
  }

  .prompt-content { flex: 1; min-width: 0; }

  .prompt-label {
    font-size: 0.93rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.3rem;
    line-height: 1.3;
  }

  .prompt-text {
    font-size: 0.81rem;
    color: var(--text-soft);
    line-height: 1.65;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .copy-icon {
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 7px;
    color: var(--text-muted);
    transition: all 0.15s;
    margin-top: 0.05rem;
  }

  .prompt-card:hover .copy-icon { color: var(--accent); background: var(--accent-dim); }
  .prompt-card.copied .copy-icon { color: var(--copied); background: rgba(52,211,153,0.08); }
  .copy-icon svg { width: 15px; height: 15px; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--copied);
    color: #0f0f12;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0.5rem 1.1rem;
    border-radius: 100px;
    pointer-events: none;
    opacity: 0;
    transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
    z-index: 100;
  }

  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── Add section ── */
  .add-section {
    margin-top: 3.5rem;
    padding-top: 1.75rem;
    border-top: 1px solid var(--border);
  }

  .add-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.81rem;
    font-weight: 500;
    padding: 0.65rem 1rem;
    border-radius: var(--radius);
    border: 1px dashed var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    width: 100%;
    transition: all 0.15s;
  }

  .add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .add-form { display: none; flex-direction: column; gap: 0.6rem; }
  .add-form.visible { display: flex; }

  .reset-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.71rem;
    padding: 0.3rem 0.65rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    margin-top: 0.5rem;
    transition: all 0.15s;
    display: block;
  }

  .reset-btn:hover { color: var(--text); border-color: var(--border-hover); }

  .add-form input,
  .add-form textarea,
  .add-form select {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    padding: 0.65rem 0.9rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .add-form input::placeholder,
  .add-form textarea::placeholder { color: var(--text-muted); }
  .add-form input:focus,
  .add-form textarea:focus { border-color: var(--accent); }
  .add-form textarea { resize: vertical; min-height: 90px; line-height: 1.55; }
  .add-form select { cursor: pointer; }

  .form-actions { display: flex; gap: 0.4rem; justify-content: flex-end; }

  .form-actions button {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 0.5rem 1.05rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-cancel { background: transparent; color: var(--text-muted); }
  .btn-cancel:hover { color: var(--text); border-color: var(--border-hover); }

  .btn-save {
    background: var(--accent);
    color: #0f0f12;
    border-color: var(--accent);
    font-weight: 700;
  }

  .btn-save:hover { filter: brightness(1.1); }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Desktop: 3-column grid ── */
  @media (min-width: 900px) {
    .container { max-width: 1180px; }
    .filter-bar { display: none; }
    .prompt-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
      align-items: start;
    }
    .phase-section { gap: 0.5rem; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-kicker">prompt_clipboard</div>
    <h1>Your prompts,<br>always ready.</h1>
    <div class="header-rule"></div>
    <p>Click any prompt to copy it to your clipboard.</p>
  </header>

  <div class="filter-bar" id="filters"></div>
  <div class="prompt-list" id="promptList"></div>

  <div class="add-section">
    <button class="add-btn" id="addBtn" onclick="toggleForm()">+ add prompt</button>
    <button class="reset-btn" onclick="resetDefaults()">reset to defaults</button>
    <div class="add-form" id="addForm">
      <input type="text" id="newLabel" placeholder="Label (e.g. Handoff Doc)">
      <textarea id="newPrompt" placeholder="Prompt text..."></textarea>
      <select id="newTag">
        <option value="before">before</option>
        <option value="during">during</option>
        <option value="after">after</option>
      </select>
      <div class="form-actions">
        <button class="btn-cancel" onclick="toggleForm()">cancel</button>
        <button class="btn-save" onclick="savePrompt()">save</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast">✓ copied</div>

<script>
const CLIPBOARD_ICON = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9.75a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184" /></svg>`;
const CHECK_ICON    = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" /></svg>`;

const PHASE_ORDER = ['before', 'during', 'after'];
const PHASE_NUMS  = { before: '01', during: '02', after: '03' };

const DEFAULT_PROMPTS = [
  { id: 'd5',  label: 'Explain Before Changing',  tag: 'before', text: 'Before writing any code, explain your plan in plain language. What will you change, why, and what are the tradeoffs? Wait for my approval before implementing.' },
  { id: 'd11', label: 'Scope Check',              tag: 'before', text: "Before starting, tell me: What files will you need to touch? What's your understanding of the current behavior vs. desired behavior? Are there any dependencies or side effects I should know about?" },
  { id: 'd23', label: 'Ask Before You Assume',    tag: 'before', text: "If anything about this request is ambiguous or could be interpreted multiple ways, ask me 1-2 clarifying questions before proceeding. Don't guess at requirements — I'd rather answer a quick question than undo wrong assumptions." },
  { id: 'd6',  label: 'Minimal Fix Only',         tag: 'during', text: 'Fix only the specific bug or issue described. Do not refactor surrounding code, rename variables, change formatting, or make any other improvements — no matter how tempting.' },
  { id: 'd28', label: 'Stay in Your Lane',        tag: 'during', text: "Only change what I've asked you to change. Do not \"improve\" other parts of the code you happen to notice. Do not add features I didn't request. Do not update formatting or style in files I didn't mention. Stay focused." },
  { id: 'd27', label: 'One Thing at a Time',      tag: 'during', text: "Let's work on this incrementally. Do one small, complete change at a time. After each change, verify it works before moving on. Don't try to do everything in a single pass." },
  { id: 'd26', label: 'Expected vs. Actual',      tag: 'during', text: "Here's the bug: I expected [X] but I'm getting [Y]. Here's the relevant code: [paste]. Don't rewrite everything — just identify the root cause and suggest the minimal fix." },
  { id: 'd4',  label: 'Code Review',              tag: 'after',  text: "Review this code for bugs, edge cases, performance issues, and readability. Don't refactor — just flag problems with brief explanations of why they matter." },
  { id: 'd13', label: 'Risk Assessment',          tag: 'after',  text: "What risk is there to making these changes? Are you certain you understand all the angles and ramifications? Walk me through what could break, what depends on this code, and what assumptions you're making. If you're not fully certain, say so." },
  { id: 'd2',  label: 'Handoff Document',         tag: 'after',  text: "Create a handoff document that captures all the key themes, decisions, open questions, and the current state of the project. Include enough context that a new AI session (or a teammate) could pick up where we left off." },
  { id: 'd30', label: 'Document the Architecture', tag: 'before', text: "Before we write any code, create a set of markdown documents that map the overall architecture of this project. For each file, class, and key method, write a brief description of its purpose, responsibilities, and how it fits into the rest of the system. Save them so I can use @ references in future sessions to quickly orient a new chat without reviewing the entire codebase. If no code exists yet, help me design and document an initial architecture first — then we'll implement it once we're happy with the plan." },
  { id: 'd31', label: 'Write Tests as You Go',     tag: 'during', text: "As you implement this, write unit and component tests alongside the code. Cover the core behavior and key edge cases. When done, show me how to run the full suite. Going forward, run all tests before making any changes — and fix any failures before moving on. The more thorough the tests, the safer we are from accidental regressions." },
  { id: 'd32', label: 'Architecture Review',       tag: 'after',  text: "Step back and do a full architecture review of what we've built so far. Identify anything that's grown unwieldy, overly complex, or inconsistent as features were added incrementally. Give me your top recommendations for refactoring and cleanup, ranked by impact. Then let's work through them one step at a time — propose each change, wait for my approval, and implement before moving to the next." }
];

let prompts = [];
let activeFilter = 'all';

function loadPrompts() {
  const saved = localStorage.getItem('prompt_clipboard_data');
  prompts = saved ? JSON.parse(saved) : [...DEFAULT_PROMPTS];
  if (!saved) saveToStorage();
}

function saveToStorage() {
  localStorage.setItem('prompt_clipboard_data', JSON.stringify(prompts));
}

function renderFilters() {
  const tags = ['all', ...PHASE_ORDER.filter(t => prompts.some(p => p.tag === t))];
  document.getElementById('filters').innerHTML = tags.map(tag =>
    `<button class="filter-btn ${activeFilter === tag ? 'active' : ''}" onclick="setFilter('${tag}')">${tag}</button>`
  ).join('');
}

function setFilter(tag) { activeFilter = tag; renderFilters(); applyFilter(); }

function applyFilter() {
  document.querySelectorAll('.phase-section').forEach(s => {
    s.style.display = (activeFilter === 'all' || s.classList.contains('phase-' + activeFilter)) ? '' : 'none';
  });
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function renderCard(p, delay) {
  return `<div class="prompt-card" id="card-${p.id}" onclick="copyPrompt('${p.id}')" style="animation-delay:${delay * 0.04}s">
    <div class="prompt-content">
      <div class="prompt-label">${escapeHtml(p.label)}</div>
      <div class="prompt-text">${escapeHtml(p.text)}</div>
    </div>
    <div class="copy-icon" id="icon-${p.id}">${CLIPBOARD_ICON}</div>
  </div>`;
}

function renderPrompts() {
  const container = document.getElementById('promptList');

  if (!prompts.length) {
    container.innerHTML = '<div class="empty-state">No prompts here yet.</div>';
    return;
  }

  const groups = {};
  prompts.forEach(p => { (groups[p.tag] = groups[p.tag] || []).push(p); });
  const ordered = [
    ...PHASE_ORDER.filter(t => groups[t]),
    ...Object.keys(groups).filter(t => !PHASE_ORDER.includes(t))
  ];
  let delay = 0;
  container.innerHTML = ordered.map(phase =>
    `<div class="phase-section phase-${phase}">
      <div class="phase-header">
        <div class="phase-num">${PHASE_NUMS[phase] || '—'}</div>
        <span class="phase-label">${phase}</span>
      </div>
      ${groups[phase].map(p => renderCard(p, delay++)).join('')}
    </div>`
  ).join('');

  applyFilter();
}

async function copyPrompt(id) {
  const prompt = prompts.find(p => p.id === id);
  if (!prompt) return;
  try { await navigator.clipboard.writeText(prompt.text); }
  catch {
    const ta = document.createElement('textarea');
    ta.value = prompt.text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
  const card = document.getElementById(`card-${id}`);
  const icon = document.getElementById(`icon-${id}`);
  card.classList.add('copied');
  icon.innerHTML = CHECK_ICON;
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => {
    card.classList.remove('copied');
    icon.innerHTML = CLIPBOARD_ICON;
    toast.classList.remove('show');
  }, 1200);
}

function toggleForm() {
  const form = document.getElementById('addForm');
  const btn  = document.getElementById('addBtn');
  const vis  = form.classList.toggle('visible');
  btn.style.display = vis ? 'none' : 'block';
  if (vis) document.getElementById('newLabel').focus();
}

function savePrompt() {
  const label = document.getElementById('newLabel').value.trim();
  const text  = document.getElementById('newPrompt').value.trim();
  const tag   = document.getElementById('newTag').value;
  if (!label || !text) return;
  prompts.push({ id: 'u' + Date.now(), label, text, tag });
  saveToStorage();
  document.getElementById('newLabel').value = '';
  document.getElementById('newPrompt').value = '';
  toggleForm();
  renderFilters();
  renderPrompts();
}

function resetDefaults() {
  if (confirm('Reset to default prompts? This removes any custom prompts.')) {
    localStorage.removeItem('prompt_clipboard_data');
    prompts = [...DEFAULT_PROMPTS];
    saveToStorage();
    renderFilters();
    renderPrompts();
  }
}

loadPrompts();
renderFilters();
renderPrompts();
</script>
</body>
</html>
